<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #f9f3e8, #e8eee6);
        color: #1f2a1f;
      }
      .panel {
        width: min(520px, calc(100% - 32px));
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 250, 244, 0.94);
        border: 1px solid rgba(31, 42, 31, 0.12);
      }
      form, label {
        display: grid;
        gap: 12px;
      }
      input, button {
        font: inherit;
      }
      input {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(31, 42, 31, 0.12);
      }
      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 14px 20px;
        color: #fff;
        background: linear-gradient(135deg, #b5522d, #d97b54);
        cursor: pointer;
      }
      .error {
        color: #8a1c12;
        background: #ffe0dc;
        border-radius: 14px;
        padding: 12px 14px;
      }
      .message {
        color: #1f5135;
        background: #e2f3e4;
        border-radius: 14px;
        padding: 12px 14px;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>Verify OTP</h1>
      <p>Enter the code sent to <strong>{{ email }}</strong>.</p>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      {% if message %}<div class="message">{{ message }}</div>{% endif %}
      <form action="/admin/verify" method="post">
        <label>
          OTP
          <input type="text" name="otp_code" inputmode="numeric" maxlength="6" required />
        </label>
        <button type="submit">Verify</button>
      </form>
    </section>
  </body>
</html>
